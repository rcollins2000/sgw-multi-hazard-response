# Reverse-proxy config for the frontend container.
# `backend` resolves via docker-compose's service DNS on the sgw_net network.
# In production the equivalent config lives in an ALB / CloudFront + API
# Gateway pair — same routing, different substrate.

server {
    listen 5173;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA history-mode routing — anything unmatched falls through to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API — /api/* → backend:8000/api/*. Streaming responses (SSE for
    # the copilot chat) require request/response buffering off.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming (chat + long-running scenario runs) needs these:
        proxy_buffering       off;
        proxy_request_buffering off;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
    }

    # Cache static assets aggressively; index.html gets no-cache so a new
    # deploy is visible immediately.
    location ~* \.(?:js|css|woff2?|png|jpg|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
