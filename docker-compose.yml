# SGW platform — one-command reviewer stack.
#
#   cp .env.example .env       # set OLLAMA_API_KEY (or OPENAI_API_KEY)
#   docker compose up --build -d
#   open http://localhost:5173
#
# Three services on one shared network:
#   · postgres  — Postgres 16 + PostGIS 3.4 (source of truth)
#   · backend   — FastAPI + Pydantic + all AI capabilities. Seeds on first
#                 boot via docker_entrypoint.sh (idempotent — checks the
#                 assets table before running the seed step, so restarts
#                 are instant).
#   · frontend  — Vite build served by nginx, /api/* reverse-proxied to backend.
#
# The optional observability profile is opt-in:
#   docker compose --profile obs up -d
#
# ------ Production mapping (AWS-native — see README + docs/05_architecture.md)
# Local demo → AWS production equivalent:
#   postgres  → Amazon RDS PostgreSQL 16 + PostGIS (Multi-AZ, PITR, replicas)
#   backend   → Docker image in ECR, deployed via CodeDeploy to an EC2 ASG
#               behind an internal ALB (multi-AZ, autoscaled on RPS + p95)
#   frontend  → static bundle on S3 + CloudFront (OAC-restricted origin)
#   LLM       → AWS Bedrock (Claude 3.5 Sonnet) via VPC endpoint (PrivateLink),
#               IAM-role auth — no LLM API key on disk
#   secrets   → SecretsManager + SSM Parameter Store, injected via IAM
#               instance profile (never .env in prod)
#   data seed → replaced by real GIS / CMMS / SCADA ingestion adapters
#   audit_log → same table in RDS, replicated to S3 Object Lock (WORM)
# ---------------------------------------------------------------------------

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: sgw_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sgw}
      POSTGRES_USER: ${POSTGRES_USER:-sgw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sgw_dev_only}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sgw} -d ${POSTGRES_DB:-sgw}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - sgw_net

  backend:
    build:
      # NOTE: context is the repo root, not backend/, so the Dockerfile can
      # COPY the top-level data/ directory into the image.
      context: .
      dockerfile: backend/Dockerfile
    container_name: sgw_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sgw}:${POSTGRES_PASSWORD:-sgw_dev_only}@postgres:5432/${POSTGRES_DB:-sgw}
      # LLM — default is Ollama Cloud gpt-oss:120b; OpenAI is a swap-in fallback.
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gpt-oss:120b}
      OLLAMA_HOST: ${OLLAMA_HOST:-https://ollama.com}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.6}
      # Runtime knobs
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      BACKEND_CORS_ORIGINS: http://localhost:5173,http://frontend:5173
      NOAA_CACHE_DIR: /data/cache/noaa
      FEATURE_LLM_ENABLED: ${FEATURE_LLM_ENABLED:-true}
    ports:
      - "8000:8000"
    # No bind-mounts — this is the production shape. Dev iteration uses
    # `make dev-backend` outside Docker.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s  # first boot runs migrations + seed; grants ample slack
    networks:
      - sgw_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sgw_frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:5173"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5173/"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - sgw_net

  # ---- Optional observability stack -----------------------------------------
  # Enable with: docker compose --profile obs up -d
  prometheus:
    image: prom/prometheus:latest
    container_name: sgw_prometheus
    profiles: ["obs"]
    ports:
      - "9090:9090"
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - sgw_net

  grafana:
    image: grafana/grafana:latest
    container_name: sgw_grafana
    profiles: ["obs"]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: sgw_dev_only
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/observability/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
    networks:
      - sgw_net

volumes:
  postgres_data:
  grafana_data:

networks:
  sgw_net:
    driver: bridge
